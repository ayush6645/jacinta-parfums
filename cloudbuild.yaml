steps:
  # Build the backend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/jacinta-backend', './backend']

  # Push the backend image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/jacinta-backend']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'jacinta-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/jacinta-backend'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'DATABASE_URL=${_DATABASE_URL},SECRET_KEY=${_SECRET_KEY},RAZORPAY_KEY_ID=${_RAZORPAY_KEY_ID},RAZORPAY_KEY_SECRET=${_RAZORPAY_KEY_SECRET}'

images:
  - 'gcr.io/$PROJECT_ID/jacinta-backend'

substitutions:
  _DATABASE_URL: ''
  _SECRET_KEY: ''
  _RAZORPAY_KEY_ID: ''
  _RAZORPAY_KEY_SECRET: ''
